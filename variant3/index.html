          onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
        >
          <div className="sheet safe-bottom w-full max-w-[430px] rounded-t-xl bg-surface-container-lowest shadow-[0_-8px_40px_rgba(0,0,0,0.16)] p-5">
            {/* Title row */}
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-headline-sm text-headline-sm text-on-surface">Filters</h2>
              <button
                className="w-9 h-9 rounded-full bg-surface-container-low flex items-center justify-center transition active:scale-90"
                aria-label="Close filters"
                onClick={onClose}
              >
                <Icon name="close" size={22} />
              </button>
            </div>

            {/* Filter grid */}
            <div className="grid grid-cols-2 gap-3 mb-6">
              {FILTER_OPTIONS.map((opt) => {
                const active = local.has(opt.id);
                return (
                  <button
                    key={opt.id}
                    className={`flex items-center gap-2 rounded-lg border px-4 py-4 text-left font-label-lg text-label-lg transition active:scale-95 ${
                      active
                        ? 'border-primary bg-primary text-on-primary'
                        : 'border-surface-variant bg-surface-container-lowest text-on-surface hover:bg-surface-container-low'
                    }`}
                    onClick={() => toggle(opt.id)}
                  >
                    <Icon name={opt.icon} fill={active} size={18} />
                    {opt.label}
                  </button>
                );
              })}
            </div>

            {/* Actions */}
            <div className="flex gap-3">
              <button
                className="flex-1 h-12 rounded-lg border border-surface-variant font-label-lg text-label-lg text-on-surface hover:bg-surface-container-low transition"
                onClick={() => { setLocal(new Set()); }}
              >
                Clear all
              </button>
              <button
                className="flex-1 h-12 rounded-lg bg-primary font-label-lg text-label-lg text-on-primary hover:bg-primary/90 transition active:scale-95"
                onClick={() => { onApply(local); onClose(); }}
              >
                Show results
              </button>
            </div>
          </div>
        </div>
      );
    }

    /* ─── CartSheet ─── */
    function CartSheet({ cart, onClose, onUpdate, onCheckout }) {
      const total = cart.reduce((s, i) => s + i.qty * i.price, 0);
      const count = cart.reduce((s, i) => s + i.qty, 0);

      return (
        <div
          className="fade-in fixed inset-0 z-50 flex items-end justify-center"
          style={{ background: 'rgba(0,0,0,0.40)' }}
          onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
        >
          <div className="sheet safe-bottom w-full max-w-[430px] rounded-t-xl bg-surface-container-lowest shadow-[0_-8px_40px_rgba(0,0,0,0.16)] p-5">
            {/* Title */}
            <div className="flex items-center justify-between mb-5">
              <div>
                <h2 className="font-headline-sm text-headline-sm text-on-surface">Basket</h2>
                {count > 0 && <p className="font-body-sm text-body-sm text-secondary mt-0.5">{count} item{count !== 1 ? 's' : ''}</p>}
              </div>
              <button
                className="w-9 h-9 rounded-full bg-surface-container-low flex items-center justify-center transition active:scale-90"
                aria-label="Close basket"
                onClick={onClose}
              >
                <Icon name="close" size={22} />
              </button>
            </div>

            {/* Items */}
            {cart.length === 0 ? (
              <div className="rounded-lg bg-surface-container-low p-6 text-center">
                <Icon name="shopping_basket" size={40} className="text-tertiary mx-auto mb-2" />
                <p className="font-body-sm text-body-sm text-secondary">Your basket is empty.</p>
              </div>
            ) : (
              <div className="max-h-[44dvh] overflow-y-auto space-y-3 mb-5">
                {cart.map((item) => (
                  <div key={item.id} className="flex items-center gap-3 rounded-lg border border-surface-variant p-4">
                    <div className="flex-1 min-w-0">
                      <h3 className="font-label-lg text-label-lg text-on-surface truncate">{item.name}</h3>
                      <p className="font-body-sm text-body-sm text-secondary truncate">{item.restaurant}</p>
                      <p className="font-label-lg text-label-lg text-on-surface mt-1">{fmt(item.price * item.qty)}</p>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      <button
                        className="w-8 h-8 rounded-full bg-surface-container-low flex items-center justify-center transition active:scale-90"
                        aria-label={`Remove one ${item.name}`}
                        onClick={() => onUpdate(item.id, -1)}
                      >
                        <Icon name="remove" size={18} />
                      </button>
                      <span className="w-5 text-center font-label-lg text-label-lg">{item.qty}</span>
                      <button
                        className="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center transition active:scale-90"
                        aria-label={`Add one ${item.name}`}
                        onClick={() => onUpdate(item.id, 1)}
                      >
                        <Icon name="add" size={18} />
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            <button
              className="flex items-center justify-between w-full h-14 rounded-lg bg-primary text-on-primary px-5 font-label-lg text-label-lg transition hover:bg-primary/90 active:scale-[.99]"
              onClick={onCheckout}
            >
              <span>Checkout</span>
              <span>{fmt(total)}</span>
            </button>
          </div>
        </div>
      );
    }

    /* ─── SortDropdown ─── */
    function SortDropdown({ value, onChange }) {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        function handler(e) {
          if (ref.current && !ref.current.contains(e.target)) setOpen(false);
        }
        document.addEventListener('mousedown', handler);
        return () => document.removeEventListener('mousedown', handler);
      }, []);

      const current = SORT_OPTIONS.find((o) => o.value === value);

      return (
        <div className="relative" ref={ref}>
          <button
            className="flex items-center gap-1 px-3 py-1.5 bg-surface-container-lowest border border-surface-variant rounded-full font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition"
            onClick={() => setOpen((o) => !o)}
            aria-haspopup="listbox"
            aria-expanded={open}
          >
            <span>{current.label}</span>
            <Icon name="arrow_drop_down" size={16} className={`transition-transform ${open ? 'rotate-180' : ''}`} />
          </button>
          {open && (
            <div className="absolute right-0 top-full mt-1 z-10 w-44 bg-surface-container-lowest rounded-lg border border-surface-variant shadow-[0_8px_24px_rgba(0,0,0,0.10)] overflow-hidden fade-in">
              {SORT_OPTIONS.map((opt) => (
                <button
                  key={opt.value}
                  className={`w-full text-left px-4 py-3 font-body-sm text-body-sm transition ${
                    opt.value === value
                      ? 'bg-primary/5 text-primary font-semibold'
                      : 'text-on-surface hover:bg-surface-container-low'
                  }`}
                  onClick={() => { onChange(opt.value); setOpen(false); }}
                >
                  {opt.label}
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ─── App ─── */
    function App() {
      const [query, setQuery] = useState('Healthy');
      const [favorites, setFavorites] = useState(() => new Set(RESTAURANTS.filter((r) => r.favorite).map((r) => r.id)));
      const [filters, setFilters] = useState(new Set());
      const [sort, setSort] = useState('recent');
      const [selectedRestaurant, setSelectedRestaurant] = useState(null);
      const [showFilters, setShowFilters] = useState(false);
      const [showCart, setShowCart] = useState(false);
      const [cart, setCart] = useState([]);
      const [toast, setToast] = useState('');
      const [activeNav, setActiveNav] = useState('home');

      /* Auto-dismiss toast */
      useEffect(() => {
        if (!toast) return;
        const t = setTimeout(() => setToast(''), 2000);
        return () => clearTimeout(t);
      }, [toast]);

      /* Filtered & sorted restaurants */
      const visible = useMemo(() => {
        const q = query.trim().toLowerCase();
        let list = RESTAURANTS.filter((r) => {
          const hay = `${r.name} ${r.cuisine} ${r.tags.join(' ')}`.toLowerCase();
          if (q && !hay.includes(q)) return false;
          if (filters.has('promo') && !r.promo) return false;
          if (filters.has('fast') && r.time >= 30) return false;
          if (filters.has('rating') && r.rating < 4.7) return false;
          if (filters.has('verified') && !r.verified) return false;
          return true;
        });
        if (sort === 'rating') list = [...list].sort((a, b) => b.rating - a.rating);
        if (sort === 'fast')   list = [...list].sort((a, b) => a.time - b.time);
        if (sort === 'fee')    list = [...list].sort((a, b) => a.fee - b.fee);
        return list;
      }, [query, filters, sort]);

      const cartCount = cart.reduce((s, i) => s + i.qty, 0);

      function addToCart(item, msg) {
        setCart((prev) => {
          const found = prev.find((c) => c.id === item.id);
          return found
            ? prev.map((c) => c.id === item.id ? { ...c, qty: c.qty + 1 } : c)
            : [...prev, { ...item, qty: 1 }];
        });
        setToast(msg || `${item.name} added`);
      }

      function updateCart(id, delta) {
        setCart((prev) => prev.map((c) => c.id === id ? { ...c, qty: c.qty + delta } : c).filter((c) => c.qty > 0));
      }

      function toggleFavorite(id) {
        setFavorites((prev) => {
          const next = new Set(prev);
          if (next.has(id)) { next.delete(id); setToast('Removed from saved'); }
          else { next.add(id); setToast('Saved for later'); }
          return next;
        });
      }

      const resultCount = filters.size === 0 && query.toLowerCase() === 'healthy' ? 54 : visible.length;

      return (
        <div className="min-h-screen bg-surface pb-24">

          {/* ── Top App Bar ── */}
          <header className="fixed top-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-40 flex items-center justify-between px-4 h-16 bg-surface-container-lowest border-b border-surface-variant shadow-sm safe-top">
            <button
              className="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low active:scale-95 transition"
              aria-label="Go back"
              onClick={() => setToast('Going back…')}
            >
              <Icon name="arrow_back" size={24} />
            </button>
            <h1 className="font-headline-sm text-headline-sm text-on-surface">Search Results</h1>
            <button
              className="relative flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-low active:scale-95 transition text-primary-container"
              aria-label="Open basket"
              onClick={() => setShowCart(true)}
            >
              <Icon name="shopping_basket" fill size={24} />
              {cartCount > 0 && (
                <span className="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] bg-on-surface text-surface-container-lowest text-[10px] font-bold rounded-full flex items-center justify-center px-1 leading-none">
                  {cartCount}
                </span>
              )}
            </button>
          </header>

          {/* ── Main content ── */}
          <main className="pt-20 pb-6 px-container-margin">

            {/* Search + Filter */}
            <div className="flex gap-2 mb-lg items-center mt-2">
              <div className="relative flex-1">
                <span className="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-tertiary" style={{ fontSize: 22 }}>search</span>
                <input
                  className="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-surface-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-colors"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                  placeholder="Burgers, sushi, pizza…"
                  aria-label="Search food"
                />
                {query && (
                  <button
                    className="absolute right-3 top-1/2 -translate-y-1/2 text-tertiary hover:text-on-surface transition"
                    aria-label="Clear search"
                    onClick={() => setQuery('')}
                  >
                    <Icon name="close" size={20} />
                  </button>
                )}
              </div>
              <button
                className={`flex items-center justify-center w-12 h-12 rounded-lg border transition active:scale-95 ${
                  filters.size
                    ? 'bg-primary border-primary text-on-primary'
                    : 'bg-surface-container-lowest border-surface-variant text-on-surface hover:bg-surface-container-low'
                }`}
                aria-label="Open filters"
                onClick={() => setShowFilters(true)}
              >
                <Icon name="tune" size={22} />
              </button>
            </div>

            {/* Quick Reorder */}
            <section className="mb-xl">
              <h2 className="font-label-lg text-label-lg text-on-surface-variant mb-md uppercase tracking-wider">Quick Reorder</h2>
              <div className="flex overflow-x-auto gap-4 pb-2 snap-x hide-scrollbar -mx-container-margin px-container-margin">
                {QUICK_REORDERS.map((item) => (
                  <QuickReorderCard
                    key={item.id}
                    item={item}
                    onReorder={(r) => addToCart({ id: r.menuId, restaurant: r.restaurant, name: r.item, price: r.price }, `${r.item} reordered`)}
                  />
                ))}
              </div>
            </section>

            {/* Results header */}
            <div className="flex justify-between items-center mb-md">
              <h2 className="font-display-md text-display-md text-on-surface">{resultCount} Results</h2>
              <SortDropdown value={sort} onChange={setSort} />
            </div>

            {/* Active filter chips */}
            {filters.size > 0 && (
              <div className="flex flex-wrap gap-2 mb-md">
                {[...filters].map((id) => {
                  const opt = FILTER_OPTIONS.find((o) => o.id === id);
                  return (
                    <button
                      key={id}
                      className="flex items-center gap-1.5 bg-primary text-on-primary px-3 py-1.5 rounded-full font-label-md text-label-md transition active:scale-95"
                      onClick={() => {
                        setFilters((prev) => {
                          const next = new Set(prev);
                          next.delete(id);
                          return next;
                        });
                      }}
                    >
                      {opt.label}
                      <Icon name="close" size={14} />
                    </button>
                  );
                })}
              </div>
            )}

            {/* Restaurant cards */}
            {visible.length > 0 ? (
              <section className="grid grid-cols-1 gap-lg">
                {visible.map((r) => (
                  <RestaurantCard
                    key={r.id}
                    restaurant={r}
                    isFavorite={favorites.has(r.id)}
                    onOpen={setSelectedRestaurant}
                    onToggleFavorite={toggleFavorite}
                  />
                ))}
              </section>
            ) : (
              <div className="rounded-lg border border-surface-variant bg-surface-container-lowest p-8 text-center shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
                <Icon name="search_off" size={40} className="text-tertiary mx-auto mb-3" />
                <h3 className="font-headline-sm text-headline-sm text-on-surface mb-1">No results found</h3>
                <p className="font-body-sm text-body-sm text-secondary">Try clearing a filter or adjusting your search.</p>
              </div>
            )}
          </main>

          {/* ── Bottom Nav ── */}
          <nav className="safe-bottom fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[430px] z-40 flex justify-around items-start bg-surface-container-lowest border-t border-surface-variant shadow-[0_-4px_12px_rgba(0,0,0,0.04)] pt-2">
            {[
              { id: 'home',     icon: 'home',         label: 'Home' },
              { id: 'activity', icon: 'receipt_long',  label: 'Activity' },
              { id: 'offers',   icon: 'local_offer',   label: 'Offers' },
              { id: 'account',  icon: 'person',        label: 'Account' },
            ].map(({ id, icon, label }) => {
              const active = activeNav === id;
              return (
                <button
                  key={id}
                  className={`flex flex-col items-center pb-1 min-w-[56px] transition active:scale-90 ${active ? 'text-primary-container' : 'text-on-surface-variant'}`}
                  onClick={() => { setActiveNav(id); }}
                >
                  <Icon name={icon} fill={active} size={26} />
                  <span className="font-label-sm text-label-sm mt-0.5">{label}</span>
                </button>
              );
            })}
          </nav>

          {/* ── Overlays ── */}
          {selectedRestaurant && (
            <RestaurantSheet
              restaurant={selectedRestaurant}
              isFavorite={favorites.has(selectedRestaurant.id)}
              onClose={() => setSelectedRestaurant(null)}
              onToggleFavorite={() => toggleFavorite(selectedRestaurant.id)}
              onAdd={(item) => { addToCart(item); }}
            />
          )}

          {showFilters && (
            <FilterSheet
              activeFilters={filters}
              onToggle={(id) => {
                setFilters((prev) => {
                  const next = new Set(prev);
                  next.has(id) ? next.delete(id) : next.add(id);
                  return next;
                });
              }}
              onClear={() => setFilters(new Set())}
              onApply={(next) => setFilters(next)}
              onClose={() => setShowFilters(false)}
            />
          )}

          {showCart && (
            <CartSheet
              cart={cart}
              onClose={() => setShowCart(false)}
              onUpdate={updateCart}
              onCheckout={() => {
                setShowCart(false);
                if (cart.length) {
                  setToast('Proceeding to checkout…');
                  setCart([]);
                } else {
                  setToast('Your basket is empty');
                }
              }}
            />
          )}

          {/* ── Toast ── */}
          {toast && (
            <div
              className="toast fixed bottom-28 left-1/2 -translate-x-1/2 z-50 max-w-[calc(100%-48px)] bg-inverse-surface text-inverse-on-surface font-label-lg text-label-lg px-5 py-3 rounded-full shadow-[0_12px_30px_rgba(0,0,0,0.20)] whitespace-nowrap"
              role="status"
              aria-live="polite"
            >
              {toast}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
