              </div>
            )}
          </div>

          <div className="p-4">
            <h3 className="font-semibold text-[20px] leading-[28px] text-[#1a1c1c] truncate">{restaurant.name}</h3>
            <p className="text-sm text-[#3d4a3d] mt-0.5 mb-2 truncate">{restaurant.cuisine}</p>

            {/* Credibility block — variant 2: compact inline with verified_user icon */}
            <div className="flex flex-wrap items-center gap-x-2 gap-y-1 mb-3">
              <div className="flex items-center text-[#1a1c1c] text-xs font-medium">
                <Icon name="star" fill size={16} className="text-[#FFB000] mr-0.5" />
                {restaurant.rating}
                {restaurant.verified && (
                  <Icon name="verified_user" size={14} className="text-[#006e2e] ml-1" title="Verified" />
                )}
                <span className="text-[#6d7b6c] font-normal ml-1">({restaurant.reviews})</span>
              </div>
            </div>

            <div className="flex items-center justify-between mt-3 pt-3 border-t border-[#eeeeee]">
              <div className="flex items-center gap-3 text-sm text-[#1a1c1c]">
                <div className="flex items-center gap-1">
                  <Icon name="schedule" size={15} className="text-[#6d7b6c]" />
                  {restaurant.time}
                </div>
                <div className="flex items-center gap-1">
                  <Icon name="directions_bike" size={15} className="text-[#6d7b6c]" />
                  {restaurant.delivery}
                </div>
              </div>
              {restaurant.lastOrder && (
                <p className="text-[10px] text-[#6d7b6c]">{restaurant.lastOrder}</p>
              )}
            </div>
          </div>
        </article>
      );
    };

    /* ─── Cart Badge ─── */
    const CartBadge = ({ count }) => {
      const [animKey, setAnimKey] = useState(0);
      const prevCount = useRef(count);
      useEffect(() => {
        if (count !== prevCount.current) {
          setAnimKey(k => k + 1);
          prevCount.current = count;
        }
      }, [count]);
      if (count === 0) return null;
      return (
        <span
          key={animKey}
          className="badge-bounce absolute top-0.5 right-0.5 bg-[#ba1a1a] text-white text-[9px] font-bold min-w-[16px] h-4 px-0.5 rounded-full flex items-center justify-center leading-none"
        >
          {count > 9 ? '9+' : count}
        </span>
      );
    };

    /* ─── App ─── */
    const App = () => {
      const [search, setSearch]               = useState('Noodles');
      const [segment, setSegment]             = useState('recent');
      const [activeFilters, setActiveFilters] = useState(new Set(['authentic']));
      const [cartItems, setCartItems]         = useState([
        { id: 'init1', name: 'Spicy Beef Lamian',   qty: 1, price: 10.50 },
        { id: 'init2', name: 'Pork Xiao Long Bao',  qty: 1, price: 6.90  },
      ]);
      const [favorites, setFavorites]         = useState(new Set());
      const [visibleCount, setVisibleCount]   = useState(2);
      const [activeNav, setActiveNav]         = useState('activity');
      const [selectedRestaurant, setSelectedRestaurant] = useState(null);
      const [showCart, setShowCart]           = useState(false);
      const [toast, setToast]                 = useState(null);
      const [toastKey, setToastKey]           = useState(0);
      const toastTimer = useRef(null);

      const cartCount = cartItems.reduce((s, i) => s + i.qty, 0);

      const showToast = useCallback((msg) => {
        if (toastTimer.current) clearTimeout(toastTimer.current);
        setToast(msg);
        setToastKey(k => k + 1);
        toastTimer.current = setTimeout(() => setToast(null), 2200);
      }, []);

      const addToCart = useCallback((name, price = 0, qty = 1) => {
        setCartItems(prev => {
          const existing = prev.find(i => i.name === name);
          if (existing) return prev.map(i => i.name === name ? { ...i, qty: i.qty + qty } : i);
          return [...prev, { id: Date.now().toString(), name, qty, price }];
        });
        showToast('Added to basket');
        setSelectedRestaurant(null);
      }, [showToast]);

      const handleQuickReorder = useCallback((r) => {
        addToCart(r.item, 10.50, r.qty);
        showToast(`Reordered "${r.item}"`);
      }, [addToCart, showToast]);

      const toggleFavorite = useCallback((id) => {
        setFavorites(prev => {
          const next = new Set(prev);
          if (next.has(id)) { next.delete(id); showToast('Removed from favourites'); }
          else { next.add(id); showToast('Saved to favourites'); }
          return next;
        });
      }, [showToast]);

      const toggleFilter = useCallback((id) => {
        setActiveFilters(prev => {
          const next = new Set(prev);
          if (next.has(id)) next.delete(id); else next.add(id);
          return next;
        });
      }, []);

      const filtered = RESTAURANTS.filter(r => {
        const q = search.toLowerCase();
        if (!q) return true;
        return r.name.toLowerCase().includes(q) || r.cuisine.toLowerCase().includes(q);
      });

      const visible = filtered.slice(0, visibleCount);

      return (
        <div className="flex flex-col min-h-screen bg-[#f9f9f9] relative">

          {/* ── Header ── */}
          <header className="bg-white sticky top-0 z-50 border-b border-[#e8e8e8] shadow-sm flex justify-between items-center px-4 h-14 shrink-0">
            <button className="p-2 rounded-full hover:bg-[#f3f3f4] transition-colors active:scale-90 text-[#1a1c1c]">
              <Icon name="arrow_back" size={24} />
            </button>
            <h1 className="text-[24px] font-bold leading-[32px] tracking-[-0.01em] text-[#006e2e] flex-1 text-center px-4">Food Search</h1>
            <button
              onClick={() => setShowCart(true)}
              className="p-2 rounded-full hover:bg-[#f3f3f4] transition-colors relative active:scale-90 text-[#1a1c1c]"
            >
              <Icon name="shopping_basket" size={24} />
              <CartBadge count={cartCount} />
            </button>
          </header>

          {/* ── Search & Filter bar ── */}
          <div className="bg-white pt-2 pb-3 px-4 sticky top-14 z-40 border-b border-[#eeeeee] shrink-0">
            {/* Search input */}
            <div className="relative mb-4">
              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <Icon name="search" size={20} className="text-[#6d7b6c]" />
              </div>
              <input
                className="block w-full pl-10 pr-10 py-3 border border-[#e2e2e2] rounded-lg bg-white placeholder-[#6d7b6c] focus:outline-none focus:ring-1 focus:ring-[#006e2e] focus:border-[#006e2e] text-sm transition-all text-[#1a1c1c]"
                placeholder="Search for dishes, restaurants…"
                value={search}
                onChange={e => { setSearch(e.target.value); setVisibleCount(2); }}
              />
              {search && (
                <div className="absolute inset-y-0 right-0 pr-3 flex items-center">
                  <button
                    onClick={() => { setSearch(''); setVisibleCount(2); }}
                    className="text-[#6d7b6c] hover:text-[#1a1c1c] transition-colors active:scale-90"
                  >
                    <Icon name="cancel" size={20} />
                  </button>
                </div>
              )}
            </div>

            {/* Segmented control */}
            <div className="flex p-1 bg-[#f3f3f4] rounded-lg mb-3">
              {[{ id: 'recent', label: 'Recent' }, { id: 'saved', label: 'Saved Places' }].map(({ id, label }) => (
                <button
                  key={id}
                  onClick={() => setSegment(id)}
                  className={`flex-1 py-1.5 text-center rounded-md text-xs font-medium transition-all ${
                    segment === id
                      ? 'bg-white text-[#1a1c1c] shadow-sm'
                      : 'text-[#3d4a3d] hover:bg-[#e8e8e8]'
                  }`}
                >
                  {label}
                </button>
              ))}
            </div>

            {/* Filter chips */}
            <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-1 -mx-4 px-4">
              <button className="flex-none inline-flex items-center gap-1 px-3 py-1.5 rounded-full border border-[#e2e2e2] bg-white text-[#1a1c1c] text-xs font-medium hover:bg-[#f3f3f4] transition-colors whitespace-nowrap active:scale-95">
                <Icon name="tune" size={15} /> Filters
              </button>
              {FILTERS.map(({ id, label }) => {
                const active = activeFilters.has(id);
                return (
                  <button
                    key={id}
                    onClick={() => toggleFilter(id)}
                    className={`flex-none inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-medium transition-all whitespace-nowrap active:scale-95 ${
                      active
                        ? 'bg-[#00b14f] text-[#003a15] font-semibold border-none'
                        : 'border border-[#e2e2e2] bg-white text-[#1a1c1c] hover:bg-[#f3f3f4]'
                    }`}
                  >
                    {label}
                  </button>
                );
              })}
            </div>
          </div>

          {/* ── Main scroll area ── */}
          <main className="flex-1 pb-20 hide-scrollbar overflow-y-visible">

            {/* Quick Reorder */}
            {segment === 'recent' && (
              <section className="pt-4 pb-2">
                <h2 className="px-4 text-[20px] font-semibold leading-[28px] text-[#1a1c1c] mb-3">Quick Reorder</h2>
                <div className="flex gap-4 overflow-x-auto hide-scrollbar px-4 pb-2">
                  {QUICK_REORDERS.map(r => (
                    <div
                      key={r.id}
                      className="flex-none w-[280px] bg-white rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-[#eeeeee] p-3 flex items-center gap-3"
                    >
                      <div className="w-16 h-16 rounded-lg overflow-hidden bg-[#eeeeee] shrink-0">
                        <img src={r.image} alt={r.name} className="w-full h-full object-cover" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <h3 className="text-[14px] font-semibold leading-[18px] text-[#1a1c1c] truncate">{r.name}</h3>
                        <p className="text-[14px] text-[#3d4a3d] truncate mt-0.5">{r.item} · {r.qty}×</p>
                        <p className="text-[10px] text-[#6d7b6c] mt-0.5">{r.time}</p>
                      </div>
                      <button
                        onClick={() => handleQuickReorder(r)}
                        className="shrink-0 w-10 h-10 rounded-full bg-[#00b14f] text-[#003a15] flex items-center justify-center hover:bg-[#006e2e] hover:text-white transition-colors active:scale-90 shadow-sm"
                      >
                        <Icon name="add_shopping_cart" fill size={20} />
                      </button>
                    </div>
                  ))}
                </div>
              </section>
            )}

            {segment === 'saved' && (
              <div className="px-4 py-10 flex flex-col items-center text-center text-[#6d7b6c]">
                <Icon name="bookmark_border" size={48} className="text-[#bccbb9] mb-3" />
                <p className="font-medium text-[#1a1c1c]">No saved places yet</p>
                <p className="text-sm mt-1">Tap ♡ on any restaurant to save it here</p>
              </div>
            )}

            {/* Divider */}
            <div className="h-1 bg-[#eeeeee] w-full mt-2" />

            {/* Results */}
            <section className="px-4 pt-4 pb-4 space-y-6">
              <h2 className="text-[20px] font-semibold leading-[28px] text-[#1a1c1c]">
                Showing {filtered.length} result{filtered.length !== 1 ? 's' : ''}
              </h2>

              {/* Busy banner — variant 2: no dismiss button */}
              <div className="bg-[#e8e8e8] rounded-lg p-3 flex items-start gap-3 border border-[#e2e2e2]">
                <Icon name="info" size={20} className="text-[#5d5f5f] mt-0.5 shrink-0" />
                <div className="flex-1">
                  <p className="text-xs font-medium text-[#1a1c1c]">Some popular spots are busy right now</p>
                  <p className="text-xs text-[#3d4a3d] mt-0.5">Delivery times may be longer than usual.</p>
                </div>
              </div>

              {/* Empty state */}
              {visible.length === 0 && (
                <div className="text-center py-16 text-[#6d7b6c]">
                  <Icon name="search_off" size={52} className="text-[#bccbb9] mb-3" />
                  <p className="font-semibold text-[#1a1c1c]">No results found</p>
                  <p className="text-sm mt-1">Try a different search term</p>
                </div>
              )}

              {/* Cards */}
              {visible.map(r => (
                <RestaurantCard
                  key={r.id}
                  restaurant={r}
                  isFavorite={favorites.has(r.id)}
                  onToggleFavorite={toggleFavorite}
                  onClick={() => setSelectedRestaurant(r)}
                />
              ))}

              {/* Load more */}
              {visible.length < filtered.length && (
                <div className="pt-2 pb-4 flex justify-center">
                  <button
                    onClick={() => setVisibleCount(n => n + 2)}
                    className="px-6 py-2 border-2 border-[#e2e2e2] rounded-full text-xs font-semibold text-[#1a1c1c] hover:bg-[#f3f3f4] transition-colors active:scale-95"
                  >
                    Load {Math.min(filtered.length - visible.length, 2)} More Results
                  </button>
                </div>
              )}

              {visible.length >= filtered.length && filtered.length > 0 && (
                <p className="text-center text-xs text-[#6d7b6c] pb-2">You've seen all results</p>
              )}
            </section>
          </main>

          {/* ── Bottom Nav ── */}
          <nav
            className="bg-white border-t border-[#eeeeee] shadow-[0_-4px_12px_rgba(0,0,0,0.08)] flex justify-around items-center h-16 shrink-0"
            style={{
              position: 'fixed',
              bottom: 0,
              width: '100%',
              maxWidth: 430,
              left: '50%',
              transform: 'translateX(-50%)',
              zIndex: 50,
            }}
          >
            {NAV_ITEMS.map(({ id, icon, label }) => {
              const active = activeNav === id;
              return (
                <button
                  key={id}
                  onClick={() => setActiveNav(id)}
                  className={`flex flex-col items-center justify-center w-full h-full transition-colors active:scale-90 ${
                    active ? 'text-[#006e2e]' : 'text-[#6d7b6c] hover:text-[#006e2e]'
                  }`}
                >
                  <Icon name={icon} fill={active} size={24} className="mb-0.5" />
                  <span className={`text-[10px] ${active ? 'font-bold' : 'font-normal'}`}>{label}</span>
                </button>
              );
            })}
          </nav>

          {/* ── Restaurant detail sheet ── */}
          {selectedRestaurant && (
            <RestaurantSheet
              restaurant={selectedRestaurant}
              onClose={() => setSelectedRestaurant(null)}
              onAddToCart={addToCart}
            />
          )}

          {/* ── Cart sheet ── */}
          {showCart && (
            <CartSheet
              items={cartItems}
              onClose={() => setShowCart(false)}
              onClear={() => { setCartItems([]); setShowCart(false); showToast('Basket cleared'); }}
            />
          )}

          {/* ── Toast ── */}
          {toast && <Toast key={toastKey} message={toast} />}
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
